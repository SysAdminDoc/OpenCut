version: "3.8"

services:
  opencut-server:
    build: .
    ports:
      - "5679:5679"
    volumes:
      # Persist models, settings, job history across container rebuilds
      # Match the Dockerfile's non-root ``opencut`` user home; mounting to
      # ``/root/.opencut`` writes to the wrong path (or fails outright)
      # because the runtime user is ``opencut`` (uid != 0), not root.
      - opencut-data:/home/opencut/.opencut
    environment:
      - OPENCUT_BUNDLED=false
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5679/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # GPU-enabled variant — use: docker compose --profile gpu up
  opencut-server-gpu:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5679:5679"
    volumes:
      # Match the Dockerfile's non-root ``opencut`` user home; mounting to
      # ``/root/.opencut`` writes to the wrong path (or fails outright)
      # because the runtime user is ``opencut`` (uid != 0), not root.
      - opencut-data:/home/opencut/.opencut
    environment:
      - OPENCUT_BUNDLED=false
      - PYTHONUNBUFFERED=1
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5679/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    profiles:
      - gpu

volumes:
  opencut-data:
